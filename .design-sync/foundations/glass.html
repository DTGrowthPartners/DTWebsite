<!-- @dsCard group="Materials" name="Liquid glass" subtitle="Variante sutil y fuerte sobre fondo de marca" -->
<!doctype html><html><head><meta charset="utf-8"><style>@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
@import url('https://fonts.cdnfonts.com/css/pp-neue-montreal');
@import url('https://fonts.cdnfonts.com/css/neue-machina');
* { margin: 0; box-sizing: border-box; }
body { background: #07060F; color: #F5F8FF; font-family: Manrope, Inter, sans-serif; padding: 28px; min-height: 100vh; }
.heading { font-family: 'PP Neue Montreal', Inter, sans-serif; }
.mono { font-family: 'Neue Machina', 'Space Mono', monospace; }
.kicker { font-family: 'Neue Machina', 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.grid { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px; }
.liquid-glass {
  background: rgba(255,255,255,0.01); background-blend-mode: luminosity;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden;
}
.liquid-glass::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
  background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.liquid-glass-strong {
  background: rgba(8,8,22,0.5); backdrop-filter: blur(50px) saturate(140%); -webkit-backdrop-filter: blur(50px) saturate(140%);
  box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15); position: relative; overflow: hidden;
}
.liquid-glass-strong::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
  background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.gradient-text { background: linear-gradient(100deg, #0F76D6 0%, #26BDF0 55%, #C2FBFF 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
body { background: radial-gradient(80% 60% at 20% 20%, rgba(15,118,214,0.5), transparent 60%), radial-gradient(70% 60% at 85% 75%, rgba(124,58,237,0.45), transparent 60%), #05060f; }
.demo { border-radius: 20px; padding: 22px; width: 280px; }
.demo h4 { font-size: 14px; margin-bottom: 6px; } .demo p { font-size: 11px; color: rgba(255,255,255,0.65); line-height: 1.5; }
</style></head><body>
<div class="kicker">// Material · liquid glass</div>
<div class="grid">
  <div class="demo liquid-glass">
    <h4>.liquid-glass</h4>
    <p>rgba(255,255,255,0.01) · blur(4px) · borde degradado blanco (0.45→0→0.45) vía mask XOR · brillo inset</p>
  </div>
  <div class="demo liquid-glass-strong">
    <h4>.liquid-glass-strong</h4>
    <p>rgba(8,8,22,0.5) · blur(50px) saturate(140%) · para cards protagonistas y paneles</p>
  </div>
</div>
<div class="grid">
  <span class="liquid-glass" style="border-radius:999px;padding:8px 16px;font-size:12px">chip glass</span>
  <span class="liquid-glass" style="border-radius:14px;width:52px;height:52px;display:flex;align-items:center;justify-content:center">◎</span>
  <span class="liquid-glass" style="border-radius:999px;padding:8px 14px;font-size:11px;display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:99px;background:#26BDF0;box-shadow:0 0 10px #26BDF0"></span>Respondemos en &lt;24h</span>
</div>
</body></html>
